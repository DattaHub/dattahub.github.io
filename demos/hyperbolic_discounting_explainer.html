
<style>
  .hd-wrap { padding: 1rem 0; font-family: var(--font-sans); }
  .hd-controls { display: flex; align-items: center; gap: 16px; margin-bottom: 1.5rem; flex-wrap: wrap; }
  .hd-label { font-size: 13px; color: var(--color-text-secondary); }
  .hd-val { font-size: 14px; font-weight: 500; min-width: 28px; color: var(--color-text-primary); }
  .hd-legend { display: flex; gap: 20px; margin-top: 12px; flex-wrap: wrap; }
  .hd-legend-item { display: flex; align-items: center; gap: 6px; font-size: 12px; color: var(--color-text-secondary); }
  .hd-dot { width: 24px; height: 3px; border-radius: 2px; }
  .hd-note { font-size: 12px; color: var(--color-text-secondary); margin-top: 8px; }
</style>
<div class="hd-wrap">
  <div class="hd-controls">
    <span class="hd-label">Impatience (k)</span>
    <input type="range" id="kSlider" min="0.05" max="1.5" step="0.05" value="0.5" style="width: 160px;" />
    <span class="hd-val" id="kVal">0.5</span>
    <span class="hd-label" style="margin-left:12px;">Reward</span>
    <input type="range" id="aSlider" min="100" max="1000" step="50" value="200" style="width: 120px;" />
    <span class="hd-val" id="aVal">₹200</span>
  </div>
  <div style="position: relative; width: 100%; height: 280px;">
    <canvas id="hdChart"></canvas>
  </div>
  <div class="hd-legend">
    <div class="hd-legend-item"><div class="hd-dot" style="background:#3B6D11;"></div>Exponential (patient)</div>
    <div class="hd-legend-item"><div class="hd-dot" style="background:#D85A30;"></div>Hyperbolic (impulsive)</div>
  </div>
  <div class="hd-note">Hyperbolic: V = A / (1 + k·D) &nbsp;|&nbsp; Exponential: V = A · e<sup>−k·D</sup> &nbsp;|&nbsp; D = delay in months, k = discount rate, A = reward amount</div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script>
const labels = Array.from({length: 25}, (_, i) => i);
let chart;

function getValues(k, A) {
  return {
    hyp: labels.map(d => A / (1 + k * d)),
    exp: labels.map(d => A * Math.exp(-k * d))
  };
}

function buildChart(k, A) {
  const {hyp, exp} = getValues(k, A);
  const ctx = document.getElementById('hdChart').getContext('2d');
  if (chart) chart.destroy();
  chart = new Chart(ctx, {
    type: 'line',
    data: {
      labels: labels.map(d => d + 'm'),
      datasets: [
        {
          label: 'Hyperbolic',
          data: hyp,
          borderColor: '#D85A30',
          backgroundColor: 'rgba(216,90,48,0.07)',
          borderWidth: 2.5,
          pointRadius: 0,
          fill: false,
          tension: 0.4
        },
        {
          label: 'Exponential',
          data: exp,
          borderColor: '#3B6D11',
          backgroundColor: 'rgba(59,109,17,0.07)',
          borderWidth: 2,
          pointRadius: 0,
          fill: false,
          tension: 0.4,
          borderDash: [6, 4]
        }
      ]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      plugins: {
        legend: { display: false },
        tooltip: {
          callbacks: {
            label: ctx => ' ₹' + ctx.parsed.y.toFixed(0)
          }
        }
      },
      scales: {
        x: {
          title: { display: true, text: 'Delay', color: '#888', font: { size: 12 } },
          ticks: { maxTicksLimit: 10, color: '#888' },
          grid: { color: 'rgba(128,128,128,0.12)' }
        },
        y: {
          title: { display: true, text: 'Perceived value (₹)', color: '#888', font: { size: 12 } },
          ticks: { color: '#888', callback: v => '₹' + Math.round(v) },
          grid: { color: 'rgba(128,128,128,0.12)' }
        }
      }
    }
  });
}

const kSlider = document.getElementById('kSlider');
const aSlider = document.getElementById('aSlider');
const kVal = document.getElementById('kVal');
const aVal = document.getElementById('aVal');

function update() {
  const k = parseFloat(kSlider.value);
  const A = parseInt(aSlider.value);
  kVal.textContent = k.toFixed(2);
  aVal.textContent = '₹' + A;
  buildChart(k, A);
}

kSlider.addEventListener('input', update);
aSlider.addEventListener('input', update);
update();
</script>
